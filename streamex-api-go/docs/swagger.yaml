definitions:
  main.MovieDetailResponse:
    description: 'Movie details with streaming sources. Note: ''episodes'' for a movie
      will typically contain a single entry representing the full movie.'
    properties:
      adult:
        example: false
        type: boolean
      backdrop_path:
        example: /6yeVcxFR0j08vlv2OlL6zbewm4D.jpg
        type: string
      belongs_to_collection:
        description: Can be null or an object
      budget:
        example: 0
        type: integer
      description:
        example: On one last grueling mission...
        type: string
      episodes:
        items:
          $ref: '#/definitions/main.MovieEpisodeSource'
        type: array
      genres:
        description: 'Example: [{"id": 28, "name": "Action"}]'
        items:
          additionalProperties: true
          type: object
        type: array
      homepage:
        example: https://www.netflix.com/title/81768525
        type: string
      id:
        example: "1265609"
        type: string
      imdbId:
        example: tt15940132
        type: string
      original_language:
        example: en
        type: string
      original_title:
        example: War Machine
        type: string
      overview:
        example: On one last grueling mission...
        type: string
      popularity:
        example: 554.0951
        type: number
      poster:
        example: https://image.tmdb.org/t/p/w500/tlPgDzwIE7VYYIIAGCTUOnN4wI1.jpg
        type: string
      poster_path:
        example: /tlPgDzwIE7VYYIIAGCTUOnN4wI1.jpg
        type: string
      release_date:
        example: "2026-02-12"
        type: string
      revenue:
        example: 0
        type: integer
      runtime:
        example: 110
        type: integer
      seasons_count:
        example: 0
        type: integer
      spoken_languages:
        description: 'Example: [{"english_name": "English", "iso_639_1": "en", "name":
          "English"}]'
        items:
          additionalProperties:
            type: string
          type: object
        type: array
      status:
        example: Released
        type: string
      tagline:
        example: All grit. No quit.
        type: string
      title:
        example: War Machine
        type: string
      tmdbId:
        example: "1265609"
        type: string
      type:
        example: movie
        type: string
      video:
        example: false
        type: boolean
      vote_average:
        example: 7.243
        type: number
      vote_count:
        example: 818
        type: integer
    type: object
  main.MovieEpisodeSource:
    description: Episode details for a movie, including its streaming sources.
    properties:
      episode_number:
        example: 1
        type: integer
      name:
        example: Full Movie
        type: string
      sources:
        description: 'Example: [{"provider": "vidking", "url": "https://vidking.net/embed/movie/1265609?color=e50914&autoPlay=true"}]'
        items:
          additionalProperties:
            type: string
          type: object
        type: array
    type: object
  main.ProviderStatus:
    properties:
      error:
        description: Pesan error jika ada
        type: string
      name:
        description: Nama provider
        type: string
      response_time:
        description: Waktu respons dalam ms
        type: integer
      status:
        description: 'Status: up, down, unstable'
        type: string
      type:
        description: 'Jenis konten: tv, movie, anime'
        type: string
    type: object
info:
  contact: {}
  description: |-
    Movie details with streaming sources.
    Note: 'episodes' for a movie will typically contain a single entry representing the full movie.
paths:
  /api/detail/{category}/{id}:
    get:
      consumes:
      - application/json
      description: Mengambil detail lengkap untuk serial TV atau anime, termasuk metadata
        dan daftar sumber streaming.
      parameters:
      - description: 'Kategori konten: ''tv'' atau ''anime'''
        in: path
        name: category
        required: true
        type: string
      - description: ID konten (TMDB ID untuk tv, HiAnime ID untuk anime)
        in: path
        name: id
        required: true
        type: string
      - default: "1"
        description: Nomor musim (Hanya berlaku untuk 'tv')
        in: query
        name: season
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Untuk kategori 'tv' atau 'anime'
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Dapatkan detail konten (TV atau Anime)
      tags:
      - content
  /api/list/{category}:
    get:
      consumes:
      - application/json
      description: Menampilkan daftar film, serial TV, atau anime populer. Untuk anime,
        gunakan parameter 'status'.
      parameters:
      - description: 'Kategori: tv, movie, anime'
        in: path
        name: category
        required: true
        type: string
      - default: "1"
        description: Halaman
        in: query
        name: page
        type: string
      - default: most-popular
        description: 'Status/Filter khusus Anime: trending, top-airing, most-popular,
          most-favorite, top-upcoming, completed, top-rated'
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Daftar konten populer
      tags:
      - content
  /api/movie/{id}:
    get:
      consumes:
      - application/json
      description: Mengambil detail lengkap untuk film, termasuk metadata dan daftar
        sumber streaming.
      parameters:
      - description: ID film (TMDB ID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.MovieDetailResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Dapatkan detail film
      tags:
      - content
  /api/providers/health:
    get:
      consumes:
      - application/json
      description: Memeriksa ketersediaan dan waktu respons semua provider streaming
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.ProviderStatus'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Dapatkan status kesehatan semua provider
      tags:
      - providers
  /api/search:
    get:
      consumes:
      - application/json
      description: Mencari film, serial TV, atau anime berdasarkan query
      parameters:
      - description: Kata kunci pencarian
        in: query
        name: query
        required: true
        type: string
      - default: "1"
        description: Halaman
        in: query
        name: page
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cari konten
      tags:
      - search
swagger: "2.0"
